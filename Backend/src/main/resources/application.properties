# ===========================
# Smart Library - Application Properties
# ===========================

# MySQL DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smart_library_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8080

# Application Name
spring.application.name=smart-library

# ===========================
# Google Gemini AI (via Spring AI)
# ===========================
spring.ai.google.genai.api-key=${GEMINI_API_KEY:AIzaSyAznB_O53cKjClDwhEpSH9eeK19nGWoKIU}
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY:AIzaSyAznB_O53cKjClDwhEpSH9eeK19nGWoKIU}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.7
spring.ai.google.genai.embedding.model=text-embedding-004

# ===========================
# ChromaDB Vector Store
# ===========================
spring.ai.vectorstore.chroma.client.host=http://localhost
spring.ai.vectorstore.chroma.client.port=8000
spring.ai.vectorstore.chroma.collection-name=smart_library_books
spring.ai.vectorstore.chroma.initialize-schema=true

# Book file storage path
smartlibrary.books.upload-dir=./uploads/books
